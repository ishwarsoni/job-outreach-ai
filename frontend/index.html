<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zora — Signal-based outreach system</title>
    <meta name="description"
        content="A data-driven outreach pipeline that prioritizes accuracy over volume by discovering and validating real emails from public sources.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/static/styles.css?v=3">
</head>

<body>

    <!-- ═══ Ambient Background ═══ -->
    <div class="ambient-orb ambient-orb--1"></div>
    <div class="ambient-orb ambient-orb--2"></div>

    <!-- ═══ Header ═══ -->
    <header class="app-header">
        <div class="header-content">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </div>
                <span class="brand-name">Zora</span>
            </div>
            <div class="header-actions">
                <button id="btn-download" class="btn btn-ghost" disabled title="Download CSV">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    <span>Export CSV</span>
                </button>
            </div>
        </div>
    </header>

    <!-- ═══ Main Content ═══ -->
    <main class="app-main">

        <!-- ── Hero + Search ── -->
        <section class="hero" id="search-section">
            <div class="hero-text">
                <h1 class="hero-title">Find your next <span class="text-gradient">opportunity</span></h1>
                <p class="hero-subtitle">Signal-based outreach system.</p>
            </div>

            <form id="search-form" class="search-bar">
                <div class="search-field search-field--company">
                    <label for="input-company" class="sr-only">Company</label>
                    <svg class="search-field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"></path>
                        <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"></path>
                        <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"></path>
                    </svg>
                    <input type="text" id="input-company" class="search-input" placeholder="Company" required
                        autocomplete="off">
                </div>
                <div class="search-field search-field--title">
                    <label for="input-title" class="sr-only">Job Title</label>
                    <svg class="search-field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <input type="text" id="input-title" class="search-input" placeholder="Job Title" required
                        autocomplete="off">
                </div>
                <div class="search-field search-field--domain">
                    <label for="input-domain" class="sr-only">Email Domain</label>
                    <svg class="search-field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M2 12h20"></path>
                        <path
                            d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                        </path>
                    </svg>
                    <input type="text" id="input-domain" class="search-input" placeholder="Domain (optional)"
                        autocomplete="off">
                </div>
                <div class="search-field search-field--max">
                    <label for="input-max-results" class="sr-only">Max Results</label>
                    <input type="number" id="input-max-results" class="search-input search-input--num" value="10"
                        min="1" max="25">
                </div>
                <div class="search-actions">
                    <label class="toggle-label" title="Search only — skip validation & drafting">
                        <input type="checkbox" id="input-dry-run">
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                        <span class="toggle-text">Dry run</span>
                    </label>
                    <button type="submit" id="btn-search" class="btn btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                        </svg>
                        <span>Run Pipeline</span>
                    </button>
                </div>
            </form>
        </section>

        <!-- ── Pipeline Progress ── -->
        <section class="pipeline-bar" id="pipeline-section" style="display: none;">
            <div class="pipeline-steps" id="pipeline-stepper">
                <div class="pip-step" data-step="1">
                    <div class="pip-dot">
                        <span class="pip-num">1</span>
                        <svg class="pip-check" width="12" height="12" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        <div class="pip-spinner"></div>
                    </div>
                    <span class="pip-label">Find Targets</span>
                    <span class="pip-msg" id="step-msg-1">Waiting...</span>
                </div>
                <div class="pip-connector"></div>
                <div class="pip-step" data-step="2">
                    <div class="pip-dot">
                        <span class="pip-num">2</span>
                        <svg class="pip-check" width="12" height="12" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        <div class="pip-spinner"></div>
                    </div>
                    <span class="pip-label">Validate Emails</span>
                    <span class="pip-msg" id="step-msg-2">Waiting...</span>
                </div>
                <div class="pip-connector"></div>
                <div class="pip-step" data-step="3">
                    <div class="pip-dot">
                        <span class="pip-num">3</span>
                        <svg class="pip-check" width="12" height="12" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        <div class="pip-spinner"></div>
                    </div>
                    <span class="pip-label">Draft Emails</span>
                    <span class="pip-msg" id="step-msg-3">Waiting...</span>
                </div>
                <div class="pip-connector"></div>
                <div class="pip-step" data-step="4">
                    <div class="pip-dot">
                        <span class="pip-num">4</span>
                        <svg class="pip-check" width="12" height="12" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        <div class="pip-spinner"></div>
                    </div>
                    <span class="pip-label">Export</span>
                    <span class="pip-msg" id="step-msg-4">Waiting...</span>
                </div>
            </div>
        </section>

        <!-- ── Results Grid ── -->
        <section class="results-section" id="results-section" style="display: none;">
            <div class="results-header">
                <h2 class="results-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    Discovered Profiles
                </h2>
                <span class="results-count" id="results-count"></span>
            </div>
            <div class="results-grid" id="results-body"></div>
        </section>

        <!-- ── Empty State ── -->
        <section class="empty-state" id="empty-state">
            <div class="empty-icon-ring">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
            </div>
            <h3 class="empty-title">Ready when you are</h3>
            <p class="empty-subtitle">Enter a company and role above to start discovering hiring managers</p>
        </section>
    </main>

    <!-- Gmail compose opens in a new tab — no drawer needed -->

    <!-- ═══ Toast ═══ -->
    <div class="toast" id="toast">
        <span class="toast-message" id="toast-message"></span>
    </div>

    <!-- App Script -->
    <script src="/static/app.js?v=3"></script>
</body>

</html>
