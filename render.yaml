services:
  - type: web
    name: zora-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: SEARCH_BACKEND
        value: ddg
      - key: GOOGLE_COOLDOWN_SECONDS
        value: "1800"
